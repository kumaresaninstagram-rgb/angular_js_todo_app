<!-- Filter Tabs -->
<div class="filter-tabs">
  <button
    [class.active]="filter === 'all'"
    (click)="filter = 'all'">
    📋 All ({{ todos.length }})
  </button>
  <button
    [class.active]="filter === 'active'"
    (click)="filter = 'active'">
    ⏳ Active ({{ activeCount }})
  </button>
  <button
    [class.active]="filter === 'completed'"
    (click)="filter = 'completed'">
    ✅ Completed ({{ completedCount }})
  </button>
</div>

<!-- Todo Items -->
<div class="todo-list">
  <app-todo-item
    *ngFor="let todo of filteredTodos; trackBy: trackById"
    [todo]="todo"
    (toggle)="onToggle($event)"
    (delete)="onDelete($event)"
    (edit)="onEdit($event)"
  ></app-todo-item>

  <!-- Empty State -->
  <div class="empty-state" *ngIf="filteredTodos.length === 0">
    <div class="empty-icon">📝</div>
    <p *ngIf="filter === 'all'">No todos yet. Add one above!</p>
    <p *ngIf="filter === 'active'">No active todos. You're all done! 🎉</p>
    <p *ngIf="filter === 'completed'">No completed todos yet.</p>
  </div>
</div>
